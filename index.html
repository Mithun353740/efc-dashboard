<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantum Vortex eFC Manager</title>
    
    <!-- Aggressive Cache Busting Meta Tags -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link rel="icon" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    
    <!-- Open Graph Meta Tags for beautiful previews on Discord/WhatsApp/Socials -->
    <meta property="og:title" content="Quantum Vortex FC | Official Portal" />
    <meta property="og:description" content="Where Digital Strategy Meets Kinetic Chaos. View official club standings, analytics, and elite tournament match histories." />
    <!-- Use a reliable Unsplash absolute URL for the preview image -->
    <meta property="og:image" content="/logo-512x512.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Quantum Vortex FC | Official Portal" />
    <meta name="twitter:description" content="Where Digital Strategy Meets Kinetic Chaos. View official club standings, analytics, and elite tournament match histories." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=1200&h=630&auto=format&fit=crop" />
    <script>
      // Fix for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This occurs in some environments when libraries try to polyfill fetch.
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return originalFetch; },
              set: function(v) { console.warn('Prevented attempt to overwrite window.fetch'); }
            });
          }
        } catch (e) {
          console.warn('Could not redefine window.fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('SW registered:', reg);
            // Check for updates every hour
            setInterval(() => {
              reg.update();
            }, 3600000);
          }).catch(err => {
            console.log('SW registration failed:', err);
          });
        });
      }
    </script>
  </body>

</html>
